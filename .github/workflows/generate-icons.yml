name: Generate PNG Icons

on:
  push:
    paths:
      - 'icon.svg'
  workflow_dispatch:

jobs:
  generate-icons:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get install -y librsvg2-bin

      - name: Generate 192x192 PNG
        run: rsvg-convert -w 192 -h 192 icon.svg -o icon-192.png

      - name: Generate 512x512 PNG
        run: rsvg-convert -w 512 -h 512 icon.svg -o icon-512.png

      - name: Commit icons
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add icon-192.png icon-512.png
          git diff --staged --quiet || git commit -m "Auto: gerar icones PNG para PWA"
          git push
